name: deploy-systemd-main

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-systemd-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy changed services on production server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 30m
          debug: true
          script_stop: true
          script: |
            set -euo pipefail
            cd /root/loomapos
            git fetch origin main
            git checkout main
            git pull --ff-only origin main
            chmod +x scripts/ops/deploy-systemd-selective.sh
            ./scripts/ops/deploy-systemd-selective.sh /root/loomapos main
