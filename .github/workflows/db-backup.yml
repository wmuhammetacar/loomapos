name: db-backup

on:
  workflow_dispatch:
  schedule:
    - cron: "20 1 * * *"

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Trigger backup script on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd "${{ secrets.VPS_APP_DIR }}"
            bash infra/scripts/backup-postgres.sh

      - name: Verify restore metadata foundation
        run: pwsh ./scripts/ops/verify-restore.ps1 -Environment production -SkipLiveRestore
