groups:
  - name: loomapos-platform
    rules:
      - alert: LoomaPosApiHighErrorRate
        expr: rate(http_server_request_duration_seconds_count{service_name="loomapos-api", http_response_status_code=~"5.."}[5m]) > 0.05
        for: 10m
        labels:
          severity: critical
          runbook: failed-deployment-rollback
        annotations:
          summary: "API 5xx rate elevated"
          description: "Investigate recent deployment, dependency health, and rollback criteria."

      - alert: LoomaPosQueueBacklogGrowth
        expr: rabbitmq_queue_messages_ready > 5000
        for: 15m
        labels:
          severity: warning
          runbook: queue-backlog-growth
        annotations:
          summary: "Queue backlog is growing"
          description: "Check worker throughput, tenant skew, and integration outages."

      - alert: LoomaPosBackupValidationMissing
        expr: time() - max(backup_completed_at_seconds) > 86400
        for: 30m
        labels:
          severity: critical
          runbook: backup-restore-validation
        annotations:
          summary: "Backup freshness breach"
          description: "Last successful backup is older than the accepted production window."

      - alert: LoomaPosCertificateExpiryWindow
        expr: certificate_expiry_days < 21
        for: 1h
        labels:
          severity: warning
          runbook: certificate-rotation
        annotations:
          summary: "Certificate rotation window reached"
          description: "Rotate certificates before public edge or webhook endpoints become at risk."
