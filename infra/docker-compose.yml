name: loomapos-local

services:
  postgres:
    image: postgres:16-alpine
    container_name: loomapos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-loomapos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-loomapos}
      POSTGRES_DB: ${POSTGRES_DB:-loomapos}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-loomapos}"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-backup:
    image: prodrigestivill/postgres-backup-local:16
    container_name: loomapos-postgres-backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-loomapos}
      POSTGRES_USER: ${POSTGRES_USER:-loomapos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-loomapos}
      POSTGRES_EXTRA_OPTS: --schema=public --blobs
      SCHEDULE: ${POSTGRES_BACKUP_SCHEDULE:-@daily}
      BACKUP_KEEP_DAYS: ${POSTGRES_BACKUP_KEEP_DAYS:-14}
      BACKUP_KEEP_WEEKS: ${POSTGRES_BACKUP_KEEP_WEEKS:-8}
      BACKUP_KEEP_MONTHS: ${POSTGRES_BACKUP_KEEP_MONTHS:-6}
      HEALTHCHECK_PORT: 8080
    volumes:
      - ./infra/backups:/backups

  redis:
    image: redis:7-alpine
    container_name: loomapos-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: loomapos-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-loomapos}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-loomapos}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: loomapos-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    container_name: loomapos-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5 &&
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin} &&
      mc mb -p local/${MINIO_BUCKET:-loomapos-dev} || true
      "
    restart: "no"

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: loomapos-keycloak
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER:-loomapos}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-loomapos}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    command: ["start-dev", "--import-realm"]
    ports:
      - "${KEYCLOAK_PORT:-8081}:8080"
    volumes:
      - ./infra/keycloak/realm-loomapos.json:/opt/keycloak/data/import/realm-loomapos.json:ro

  tempo:
    image: grafana/tempo:2.6.1
    container_name: loomapos-tempo
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./infra/observability/tempo/tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - "${TEMPO_PORT:-3200}:3200"
      - "4317:4317"
    restart: unless-stopped

  loki:
    image: grafana/loki:3.2.0
    container_name: loomapos-loki
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./infra/observability/loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    ports:
      - "${LOKI_PORT:-3110}:3100"
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.107.0
    container_name: loomapos-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./infra/observability/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "${OTEL_COLLECTOR_PORT:-4318}:4318"
      - "9464:9464"
    depends_on:
      - loki
      - tempo
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: loomapos-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - ./infra/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      - otel-collector
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    container_name: loomapos-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: light
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./infra/observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./infra/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    depends_on:
      - prometheus
      - loki
      - tempo
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
  grafana_data:
  prometheus_data:
  loki_data:
  tempo_data:
